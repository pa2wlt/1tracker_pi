id: org.opencpn.OpenCPN.Plugin.onetracker
branch: stable
runtime: org.opencpn.OpenCPN
runtime-version: stable
sdk: org.freedesktop.Sdk//22.08
build-extension: true
separate-locales: false
appstream-compose: false

modules:
  - name: onetracker
    no-autogen: true
    buildsystem: cmake
    config-opts:
      - -DCMAKE_INSTALL_PREFIX=/app/extensions/org.opencpn.OpenCPN.Plugin.onetracker
      - -DCMAKE_BUILD_TYPE:STRING=Release
      - -DCMAKE_VERBOSE_MAKEFILE:BOOL=ON
      - -DBUILD_TYPE:STRING=tarball
      - -DBUILD_TESTING:BOOL=OFF
      - -Uplugin_target
    build-options:
      cxxflags: -DFLATPAK -O3
      cflags: -DFLATPAK -O3
    sources:
      - type: git
        url: https://github.com/pa2wlt/1tracker_pi.git
        branch: master
        disable-fsckobjects: true
      - type: git
        url: https://github.com/OpenCPN/opencpn-libs.git
        commit: 1a6c1a7ba74c5bb0fdf141d7d21230f49929fcdc
        dest: opencpn-libs
        disable-fsckobjects: true
