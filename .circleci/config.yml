---
version: 2.2

flatpak-steps: &flatpak-steps
  steps:
    - checkout
    - restore_cache:
        key: "<<parameters.cache-key>>
          -{{ checksum \"ci/circleci-build-flatpak.sh\" }}"
    - run: ci/circleci-build-flatpak.sh
    - save_cache:
        key: "<<parameters.cache-key>>
          -{{ checksum \"ci/circleci-build-flatpak.sh\" }}"
        paths:
          - /home/circleci/.local/share/flatpak/repo
    - run: cd /build-flatpak; /bin/bash < upload.sh
    - run: ci/git-push.sh /build-flatpak

jobs:
  build-bookworm:
    machine:
      image: ubuntu-2204:current
    resource_class: medium
    environment:
      - OCPN_TARGET: bookworm
      - TARGET_TUPLE: debian-x86_64;12;x86_64
      - CMAKE_BUILD_PARALLEL_LEVEL: 2
    steps:
      - checkout
      - run: ci/circleci-build-debian-docker.sh
      - run: cd build-debian; /bin/bash < upload.sh
      - run: ci/git-push.sh build-debian

  build-bookworm-arm64:
    machine:
      image: ubuntu-2204:current
    resource_class: arm.medium
    environment:
      - OCPN_TARGET: bookworm
      - TARGET_TUPLE: debian-arm64;12;arm64
      - CMAKE_BUILD_PARALLEL_LEVEL: 2
    steps:
      - checkout
      - run: ci/circleci-build-debian-docker.sh
      - run: cd build-debian; /bin/bash < upload.sh
      - run: ci/git-push.sh build-debian

  build-flatpak-x86:
    machine:
      image: ubuntu-2204:current
    environment:
      - OCPN_TARGET: flatpak
      - CMAKE_BUILD_PARALLEL_LEVEL: 2
      - BRANCH: 2408
    parameters:
      cache-key:
        type: string
        default: "fp-x86-24-v1"
    <<: *flatpak-steps

  build-macos-universal:
    macos:
      xcode: "15.4.0"
    environment:
      - OCPN_TARGET: macos
      - CMAKE_BUILD_PARALLEL_LEVEL: 2
      - OSX_ARCHITECTURES: arm64;x86_64
    steps:
      - checkout
      - run: sudo chmod go+w /usr/local
      - restore_cache:
          key: "{{checksum \"build-deps/macos-cache-stamp\"}}\
            -{{checksum \"cmake/MacosWxwidgets.cmake\"}}\
            -{{checksum \"ci/circleci-build-macos.sh\"}}"
      - run: ci/circleci-build-macos.sh
      - save_cache:
          key: "{{checksum \"build-deps/macos-cache-stamp\"}}\
            -{{checksum \"cmake/MacosWxwidgets.cmake\"}}\
            -{{checksum \"ci/circleci-build-macos.sh\"}}"
          paths:
            - /tmp/local.cache.tar
            - /Users/distiller/project/cache
      - run: >
          sh -c "otool -L build-osx/app/*/lib/opencpn/lib1tracker_pi.dylib"
      - run: cd build-osx; /bin/bash < upload.sh
      - run: ci/git-push.sh build-osx

# Filters
branch-only: &branch-only
  filters:
    branches:
      ignore:
        - tmp
        - /tmp-.*/
    tags:
      ignore: /.*/

tag-only: &tag-only
  filters:
    branches:
      ignore: /.*/
    tags:
      only: /^v.*/

workflows:
  version: 2

  # Runs on every branch push: quick Linux x86 feedback only
  build-linux:
    jobs:
      - build-bookworm:
          <<: *branch-only

  # Runs only on version tags (v*): full release build
  release:
    jobs:
      - build-bookworm:
          <<: *tag-only
      - build-bookworm-arm64:
          <<: *tag-only
      - build-flatpak-x86:
          <<: *tag-only
      - build-macos-universal:
          <<: *tag-only
